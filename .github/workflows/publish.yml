name: Publish to npm

# On every push to main with a new version in package.json:
#   1. publish to the npm registry (needs the NPM_TOKEN secret, an npm Automation token)
#   2. publish to GitHub Packages as @dzbuild-com/dzship (built-in GITHUB_TOKEN)
#   3. create the matching GitHub release
# Nothing runs twice: each step checks whether its target already has the version.

on:
  push:
    branches: [main]
    paths:
      - package.json
      - clients/node/**
      - README.md
      - LICENSE
      - .github/workflows/publish.yml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Read versions
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          NPM=$(npm view dzship version 2>/dev/null || echo "none")
          echo "//npm.pkg.github.com/:_authToken=$GH_TOKEN" >> ~/.npmrc
          GHP=$(npm view @dzbuild-com/dzship version --registry=https://npm.pkg.github.com 2>/dev/null || echo "none")
          RELEASE=$(gh release view "v$LOCAL" --repo "$GITHUB_REPOSITORY" --json tagName -q .tagName 2>/dev/null || echo "none")
          echo "local=$LOCAL npm=$NPM ghp=$GHP release=$RELEASE"
          echo "version=$LOCAL" >> "$GITHUB_OUTPUT"
          [ "$LOCAL" = "$NPM" ] && echo "npm=skip" >> "$GITHUB_OUTPUT" || echo "npm=publish" >> "$GITHUB_OUTPUT"
          [ "$LOCAL" = "$GHP" ] && echo "ghp=skip" >> "$GITHUB_OUTPUT" || echo "ghp=publish" >> "$GITHUB_OUTPUT"
          [ "$RELEASE" = "none" ] && echo "release=create" >> "$GITHUB_OUTPUT" || echo "release=skip" >> "$GITHUB_OUTPUT"

      - name: Smoke-test the client against the live API
        if: steps.check.outputs.npm == 'publish' || steps.check.outputs.ghp == 'publish'
        run: |
          node -e "
          const dzship = require('./clients/node/index.cjs');
          dzship.couriers().then(c => {
            if (!Array.isArray(c) || c.length < 1) throw new Error('bad couriers response');
            console.log('gateway OK,', c.length, 'couriers');
          });"

      - name: Publish to npm
        if: steps.check.outputs.npm == 'publish'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to GitHub Packages
        if: steps.check.outputs.ghp == 'publish'
        run: |
          npm pkg set name=@dzbuild-com/dzship
          npm publish --access public --registry=https://npm.pkg.github.com
          npm pkg set name=dzship
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub release
        if: steps.check.outputs.release == 'create'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V=${{ steps.check.outputs.version }}
          gh release create "v$V" --repo "$GITHUB_REPOSITORY" \
            --title "dzship $V" --generate-notes
